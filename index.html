<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Medicine Availability Finder - Login</title>
  <link rel="stylesheet" href="./css/styles.css" />
</head>
<body>
  <main class="page auth-page">
    <section class="card auth-card">
      <h1>Medicine Availability Finder</h1>
      <p class="subtitle">Sign up or log in to search nearby medicine stock.</p>

      <div class="tab-row" role="tablist" aria-label="Auth tabs">
        <button id="loginTab" class="tab active" type="button">Login</button>
        <button id="signupTab" class="tab" type="button">Sign Up</button>
      </div>

      <form id="authForm" class="form" novalidate>
        <div class="field">
          <label for="email">Email</label>
          <input id="email" name="email" type="email" placeholder="you@example.com" required />
        </div>

        <div class="field">
          <label for="password">Password</label>
          <input id="password" name="password" type="password" placeholder="Minimum 6 characters" required />
        </div>

        <button id="authSubmitBtn" class="btn primary" type="submit">Login</button>
      </form>

      <div id="authLoading" class="loading hidden">Processing...</div>
      <p id="authMessage" class="message" aria-live="polite"></p>
    </section>
  </main>

  <script type="module" src="./js/auth.js"></script>
</body>
</html>
